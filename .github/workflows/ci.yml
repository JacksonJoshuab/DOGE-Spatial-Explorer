name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0 || true

  # ── Cloud Backend Tests ──────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: doge_spatial_test
          POSTGRES_USER: doge
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install backend dependencies
        working-directory: ./cloud-backend
        run: npm ci
      
      - name: Build backend
        working-directory: ./cloud-backend
        run: npm run build
      
      - name: Run tests
        working-directory: ./cloud-backend
        env:
          DATABASE_URL: postgresql://doge:test_password@localhost:5432/doge_spatial_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: npm test || true

  # ── Blender Plugin Validation ────────────────────────────────────────────
  blender-plugin:
    name: Blender Plugin Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate Python syntax
        run: |
          python -m py_compile plugins/blender-addon/__init__.py
          python -m py_compile plugins/blender-addon/operators/__init__.py
          python -m py_compile plugins/blender-addon/panels/__init__.py
          python -m py_compile plugins/blender-addon/services/__init__.py
          python -m py_compile plugins/blender-addon/utils/__init__.py
      
      - name: Package addon
        run: |
          cd plugins
          zip -r doge-spatial-blender-addon.zip blender-addon/
          echo "Addon packaged successfully"

  # ── Swift Syntax Check ──────────────────────────────────────────────────
  swift-check:
    name: Swift Syntax Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Swift syntax (visionOS app)
        run: |
          find apps/visionos-app -name "*.swift" -exec swift -typecheck {} \; || true
      
      - name: Check Swift syntax (iOS companion)
        run: |
          find apps/ios-companion -name "*.swift" -exec swift -typecheck {} \; || true

  # ── Docker Build ─────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, backend-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: |
          docker build -t doge-spatial-backend:latest ./cloud-backend
      
      - name: Verify image
        run: |
          docker images doge-spatial-backend
